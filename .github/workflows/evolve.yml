name: Evolution

on:
  schedule:
    - cron: '0 */8 * * *'  # every 8 hours
  workflow_dispatch:       # manual trigger for testing

permissions:
  contents: write
  issues: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy

      - name: Setup GitHub CLI
        run: gh auth status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Configure git
        run: |
          git config user.name "yoagent-evolve[bot]"
          git config user.email "yoagent-evolve[bot]@users.noreply.github.com"

      - name: Run evolution session
        id: attempt1
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          PROVIDER: ${{ vars.PROVIDER || 'anthropic' }}
          BASE_URL: ${{ vars.BASE_URL || '' }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/evolve.sh
          ./scripts/evolve.sh

      - name: Retry after 15min
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          PROVIDER: ${{ vars.PROVIDER || 'anthropic' }}
          BASE_URL: ${{ vars.BASE_URL || '' }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting 15 minutes before retry..."
          sleep 900
          ./scripts/evolve.sh

      - name: Retry after 45min
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          PROVIDER: ${{ vars.PROVIDER || 'anthropic' }}
          BASE_URL: ${{ vars.BASE_URL || '' }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting 45 minutes before retry..."
          sleep 2700
          ./scripts/evolve.sh

      - name: Check for clippy warnings
        if: always()
        run: cargo clippy --quiet --all-targets 2>&1 || true
